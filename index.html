    --accent-mid: #534AB7;
    --accent-text: #3C3489;
    --success: #0f6e56;
    --success-bg: #e1f5ee;
    --amber: #854f0b;
    --amber-bg: #faeeda;

  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);

    flex-direction: column;
    align-items: center;

    align-items: center;
    gap: 14px;
  }
  .logo-mark {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: var(--shadow);
  }

  .page-title p { font-size: 13px; color: var(--text2); margin-top: 2px; }

  /* ── Chat shell ── */
  .chat-shell {

    max-width: 680px;
    background: var(--surface);
    border-radius: 18px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-lg);

    display: flex;
    flex-direction: column;
  }

    display: flex;
    align-items: center;

  }
  .bot-avatar {

    height: 36px;

    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;

  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #5dcaa5; margin-left: auto; box-shadow: 0 0 0 2px rgba(93,202,165,0.3); }

  .bc-sep { font-size: 12px; color: var(--text3); }
  .bc-current { font-size: 12px; color: var(--text2); }

    to { opacity: 1; transform: translateY(0); }

  .animate-in { animation: fadeUp 0.2s ease forwards; }

    body { padding: 1rem 0.5rem 2rem; }
    .page-header { margin-bottom: 1rem; }

  }
</style>
</head>

const FRAUD_TYPES = Object.keys(DATA);
let state = { level: "home", fraud: null, case: null, detail: null };

const svg = {
  chevronRight: `<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9,18 15,12 9,6"/></svg>`,
  arrowLeft: `<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12,19 5,12 12,5"/></svg>`,
  impact: `<svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>`,
  laws: `<svg viewBox="0 0 24 24"><path d="M18 3a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0-3-3H6a3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0 3-3V6a3 3 0 0 0-3-3 3 3 0 0 0-3 3 3 3 0 0 0 3 3h12a3 3 0 0 0 3-3 3 3 0 0 0-3-3z"/></svg>`,
  justice: `<svg viewBox="0 0 24 24"><path d="M12 22V12M12 12L3 7M12 12l9-5M3 7l9-5 9 5M3 7v10l9 5 9-5V7"/></svg>`,
  fraud: `<svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`,
};

function addBotBubble(container, html) {
  const d = document.createElement("div");
  d.className = "bubble bot animate-in";
  d.innerHTML = html;
  container.appendChild(d);
}

function addLabel(container, text) {
  const d = document.createElement("div");
  d.className = "opts-label";
  d.textContent = text;
  container.appendChild(d);
}

function addDivider(container) {
  const d = document.createElement("div");
  d.className = "divider";
  container.appendChild(d);
}

function addOptBtn(container, num, label, fn, extraClass, iconSvg) {
  const btn = document.createElement("button");
  btn.className = "opt-btn animate-in" + (extraClass ? " " + extraClass : "");
  let numHtml = num
    ? `<span class="num">${num}</span>`
    : (iconSvg ? `<span class="icon-wrap">${iconSvg}</span>` : "");
  btn.innerHTML = `${numHtml}<span class="btn-label">${label}</span><span class="chevron">${svg.chevronRight}</span>`;
  btn.onclick = fn;
  container.appendChild(btn);
}

function addBackBtn(container, label, fn) {
  const btn = document.createElement("button");
  btn.className = "opt-btn back-btn animate-in";
  btn.innerHTML = `<span style="display:flex;align-items:center;">${svg.arrowLeft}</span><span class="btn-label" style="margin-left:4px;">${label}</span>`;
  btn.onclick = fn;
  container.appendChild(btn);
}

function updateBreadcrumb() {
  const bc = document.getElementById("breadcrumb");
  const parts = [];
  if (state.level !== "home") parts.push({ label: "Home", goto: "home" });
  if (state.fraud && state.level !== "fraud") parts.push({ label: state.fraud, goto: "fraud" });
  if (state.case && (state.level === "case" || state.level === "detail")) parts.push({ label: state.case, goto: "case" });

  if (parts.length === 0) {
    bc.classList.add("hidden");
    return;
  }
  bc.classList.remove("hidden");
  const currentLabel = state.level === "detail" ? state.detail : (state.level === "case" ? state.case : (state.level === "fraud" ? state.fraud : "Home"));
  bc.innerHTML = parts.map(p =>
    `<span class="bc-link" onclick="goTo('${p.goto}')">${p.label}</span><span class="bc-sep"> / </span>`
  ).join("") + `<span class="bc-current">${currentLabel}</span>`;
}

function render() {
  const msgs = document.getElementById("messages");
  const opts = document.getElementById("options-area");
  msgs.innerHTML = "";
  opts.innerHTML = "";
  updateBreadcrumb();

  if (state.level === "home") {
    addBotBubble(msgs, `Welcome! I'm <strong>Corporate Fraud Intelligence</strong>, your guide on corporate fraud. I cover 5 categories of fraud with real Indian case studies. Select a fraud type below to explore cases, applicable laws, and justice outcomes.`);
    addLabel(opts, "Select a fraud category:");
    const colors = ["#534AB7", "#0f6e56", "#854f0b", "#993556", "#a32d2d"];
    FRAUD_TYPES.forEach((ft, i) => {
      addOptBtn(opts, `${i + 1}`, ft, () => { state.level = "fraud"; state.fraud = ft; state.case = null; state.detail = null; render(); });
    });

  } else if (state.level === "fraud") {
    const cases = Object.keys(DATA[state.fraud].cases);
    addBotBubble(msgs, `You selected <strong>${state.fraud}</strong>. There are <strong>${cases.length} recorded cases</strong>. Choose a case to explore:`);
    addLabel(opts, "Select a case:");
    cases.forEach((c, i) => {
      addOptBtn(opts, `${i + 1}`, c, () => { state.level = "case"; state.case = c; state.detail = null; render(); });
    });
    addDivider(opts);
    addBackBtn(opts, "Back to fraud categories", () => { state.level = "home"; state.fraud = null; render(); });

  } else if (state.level === "case") {
    const caseData = DATA[state.fraud].cases[state.case];
    addBotBubble(msgs, `<strong>${state.case}</strong>`);
    const card = document.createElement("div");
    card.className = "incidence-card animate-in";
    card.innerHTML = `<span class="inc-label">Incidence of Fraud</span><br><br>${caseData.incidence}`;
    msgs.appendChild(card);
    const hint = document.createElement("p");
    hint.className = "hint-text";
    hint.textContent = "Explore the details below:";
    msgs.appendChild(hint);

    addLabel(opts, "Select a detail:");
    addOptBtn(opts, null, "Impact", () => { state.level = "detail"; state.detail = "Impact"; render(); }, "impact", svg.impact);
    addOptBtn(opts, null, "Existing Laws", () => { state.level = "detail"; state.detail = "Existing Laws"; render(); }, "laws", svg.laws);
    addOptBtn(opts, null, "Justice & Punishment", () => { state.level = "detail"; state.detail = "Justice & Punishment"; render(); }, "justice", svg.justice);
    addDivider(opts);
    addBackBtn(opts, `Back to ${state.fraud} cases`, () => { state.level = "fraud"; state.case = null; render(); });

  } else if (state.level === "detail") {
    const caseData = DATA[state.fraud].cases[state.case];
    const items = caseData[state.detail];
    addBotBubble(msgs, `<strong>${state.detail}</strong> — ${state.case}`);
    const dc = document.createElement("div");
    dc.className = "detail-content animate-in";
    dc.innerHTML = `<ul>${items.map(it => `<li><span>${it}</span></li>`).join("")}</ul>`;
    msgs.appendChild(dc);

    addLabel(opts, "Explore more:");
    const others = ["Impact", "Existing Laws", "Justice & Punishment"].filter(d => d !== state.detail);
    const clsMap = { "Impact": "impact", "Existing Laws": "laws", "Justice & Punishment": "justice" };
    const svgMap = { "Impact": svg.impact, "Existing Laws": svg.laws, "Justice & Punishment": svg.justice };
    others.forEach(d => {
      addOptBtn(opts, null, d, () => { state.detail = d; render(); }, clsMap[d], svgMap[d]);
    });
    addDivider(opts);
    addBackBtn(opts, "Back to case overview", () => { state.level = "case"; render(); });
  }

  msgs.scrollTop = msgs.scrollHeight;
}

function goTo(level) {
  if (level === "home") { state.level = "home"; state.fraud = null; state.case = null; state.detail = null; }
  else if (level === "fraud") { state.level = "fraud"; state.case = null; state.detail = null; }
  else if (level === "case") { state.level = "case"; state.detail = null; }
  render();
}

render();
</script>
